<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishnu T C | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fira Code", monospace;
        background-color: #0a0a0a;
        color: #10b981;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #064e3b;
        border-radius: 10px;
      }

      .command-input:focus {
        outline: none;
      }
      .prompt {
        color: #34d399;
      }
    </style>
  </head>
  <body class="p-4 md:p-8 h-screen flex flex-col items-center">
    <div
      id="terminal-container"
      class="w-full max-w-4xl flex flex-col h-[90vh] border border-emerald-900/30 p-4 rounded-lg bg-[#0d0d0d]"
    >
      <div id="header" class="shrink-0">
        <div class="text-xl font-bold">
          VISHNU T C (Full Stack / AI Engineer)
        </div>
        <div class="text-sm opacity-80 mt-1">
          System: <span class="text-white">v2.BTech.finalYear</span> | Status:
          <span class="text-white">Active</span>
        </div>
        <div class="mt-2 text-xs opacity-80 italic">
          Type
          <span class="text-white bg-emerald-900 px-1 not-italic">'help'</span>
          to explore.
        </div>
        <hr class="border-emerald-900/50 my-4" />
      </div>

      <div
        id="history"
        class="flex-1 overflow-y-auto space-y-3 pr-2 scroll-smooth w-full"
      ></div>

      <div class="shrink-0 pt-4 border-t border-emerald-900/50 mt-2">
        <div class="flex items-center">
          <span class="prompt mr-2 shrink-0">guest@vishnu:~$</span>
          <input
            type="text"
            id="commandInput"
            autofocus
            class="bg-transparent border-none outline-none flex-1 text-white caret-emerald-500"
            autocomplete="off"
          />
        </div>
      </div>
    </div>

    <script>
      const historyContainer = document.getElementById("history");
      const input = document.getElementById("commandInput");

      const DATA = {
        about: `<p class="border-l border-emerald-900 pl-4">
                <span class="text-white">Full Stack Engineer</span> (React, Phoenix, AWS infrastructure) with <span class="text-white">over 1 year of internship experience</span> building <span class="text-white">complex UI features</span> and <span class="text-white"> high-concurrency backend systems. </span> <br /> Experienced in agentic AI tooling, system design (ETL, load reduction), and architecting distributed data pipelines <span class="text-white"> to handle millions of events. </span> Looking for 2026 SDE roles.
            </p>`,
        skills: `
                <div class='border-l border-emerald-900 pl-4 flex flex-col gap-y-1'>
                    <span class='text-white'>[Languages]</span> Elixir, TS/JS, Python, Java, C
                    <span class='text-white'>[Backend]</span> Phoenix, Node, Express
                    <span class='text-white'>[Frontend]</span> React (Remix), Svelte, Tailwind
                    <span class='text-white'>[Infra]</span> AWS (S3, SQS, Lambda, Athena)
                    <span class='text-white'>[DB]</span> PostgreSQL, MySQL, MongoDB
                </div>`,
        exp: `
                <div class='mt-2 space-y-4 border-l border-emerald-900 pl-4'>
                    <div>
                        <p class='text-white font-bold'>Full Stack Engineer Intern @ Superfuel AI</p>
                        <p class='text-xs opacity-70 italic'>Jun 2025 - Present</p>
                        <p class='text-sm mt-1'>- Re-architected S3 Pre-signed URL pattern, cutting latency from 10s to 2s.</p>
                        <p class='text-sm'>- Built Elixir GenServer rate limiters for 3rd party API adherence.</p>
                    </div>
                    <div>
                        <p class='text-white font-bold'>Frontend Intern @ 10X Minds</p>
                        <p class='text-xs opacity-70 italic'>Jul 2024 - Sep 2024</p>
                        <p class='text-sm mt-1'>- Engineered complex workout logic in Svelte with recursive state management.</p>
                    </div>
                </div>`,
        projects: `
                <div class='mt-2 space-y-3 border-l border-emerald-900 pl-4'>
                    <div><span class='text-white font-bold'>Devi Mess:</span> Automated billing engine using Node.js workers. Eliminated 10hrs/mo manual work.</div>
                    <div><span class='text-white font-bold'>Elderly-Care:</span> Multi-criteria search for 5k+ beneficiaries via MongoDB compound indexing.</div>
                </div>`,
        contact: `
                <div class='mt-2 space-y-2 border-l border-emerald-900 pl-4 w-full'>
                    <div class="flex items-center w-full justify-between">
                        <span class="text-white w-20 font-bold">Email:</span>
                        <a href="mailto:vishnutc13@gmail.com" class="hover:underline hover:text-white transition-colors">vishnutc13@gmail.com</a>
                    </div>
                    <div class="flex items-center w-full justify-between">
                        <span class="text-white w-20 font-bold">LinkedIn:</span>
                        <a href="https://www.linkedin.com/in/vishnu-t-c-a4a17a297/" target="_blank" class="hover:underline hover:text-white transition-colors italic">linkedin.com/in/vishnu-t-c-a4a17a297</a>
                    </div>
                    <div class="flex items-center w-full justify-between">
                        <span class="text-white w-20 inline-block font-bold">GitHub:</span>
                        <a href="https://github.com/TCvishnu" target="_blank" class="hover:underline hover:text-white transition-colors italic">github.com/TCvishnu</a>
                    </div>
                </div>`,
      };

      const COMMANDS = {
        help: "List available commands",
        about: "Profile summary",
        skills: "Technical stack",
        exp: "Experience details",
        projects: "Project highlights",
        contact: "Social links",
        clear: "Clear screen",
        whoami: "Session info",
      };

      function addHistory(text, color = "text-emerald-500") {
        const line = document.createElement("div");
        line.className = `mb-1 ${color}`;
        line.innerHTML = text;
        historyContainer.appendChild(line);

        historyContainer.scrollTop = historyContainer.scrollHeight;
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const cmd = input.value.toLowerCase().trim();

          addHistory(
            `<span class="text-emerald-400 font-bold">guest@vishnu:~$</span> <span class="text-white">${cmd}</span>`,
          );

          if (cmd === "clear") {
            historyContainer.innerHTML = "";
          } else if (cmd !== "") {
            processCommand(cmd);
          }

          input.value = "";
        }
      });

      function processCommand(cmd) {
        if (DATA[cmd]) {
          addHistory(DATA[cmd]);
        } else if (cmd === "help") {
          let helpHTML =
            '<div class="grid grid-cols-2 w-full gap-x-4 mt-1 border-l border-emerald-900 pl-4">';
          for (const [key, value] of Object.entries(COMMANDS)) {
            helpHTML += `<div class="text-white font-bold">${key}</div><div class="opacity-70">${value}</div>`;
          }
          helpHTML += "</div>";
          addHistory(helpHTML);
        } else if (cmd === "whoami") {
          addHistory("vishnu_tc // software_engineer_intern");
        } else {
          addHistory(
            `Command not found: ${cmd}. Type 'help' for available commands.`,
            "text-red-400",
          );
        }
      }

      document.addEventListener("click", () => input.focus());
    </script>
  </body>
</html>
